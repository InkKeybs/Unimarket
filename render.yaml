services:
  - type: web
    name: unimarket-api
    env: node
    rootDir: buyNsell-main/server
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: ATLAS_KEY
        sync: false
      - key: JWTPRIVATEKEY
        sync: false
      - key: JWTREFRESHPRIVATEKEY
        sync: false
      - key: SERVICE
        sync: false
      - key: USER
        sync: false
      - key: PASS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_CONNECTION_TIMEOUT
        value: 15000
      - key: SMTP_GREETING_TIMEOUT
        value: 15000
      - key: SMTP_SOCKET_TIMEOUT
        value: 20000
      - key: BASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
